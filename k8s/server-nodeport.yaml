apiVersion: v1
kind: Service
metadata:
  name: openobserve-nodeport
  namespace: openobserve
spec:
  type: NodePort
  selector:
    app: openobserve
  ports:
    - name: http
      port: 5080        # Service 内部端口
      targetPort: 5080   # Pod 容器端口
      nodePort: 30080    # 节点暴露端口（范围 30000-32767），这里不需要和内部端口一样
